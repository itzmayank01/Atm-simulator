<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="atm-container">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <h2>ATM Login</h2>
            <form id="login-form">
                <label for="card-number">Card Number</label>
                <input type="text" id="card-number" maxlength="16" required>
                <label for="pin">PIN</label>
                <input type="password" id="pin" maxlength="4" required>
                <button type="submit">Login</button>
                <div id="login-error" class="error"></div>
            </form>
        </div>
        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen">
            <h2>Welcome, <span id="user-name"></span></h2>
            <div class="atm-actions">
                <button id="balance-btn">Balance Inquiry</button>
                <button id="withdraw-btn">Withdraw Cash</button>
                <button id="deposit-btn">Deposit Cash</button>
                <button id="history-btn">Transaction History</button>
                <button id="logout-btn">Logout</button>
            </div>
            <div id="atm-operation"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
