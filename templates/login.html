{% extends 'base.html' %}
{% block title %}Login | ATM Simulator{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">Login</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="account" class="form-label">Account Number</label>
                        <input type="number" name="account" id="account" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="pin" class="form-label">PIN</label>
                        <input type="password" name="pin" id="pin" class="form-control" required maxlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enter</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
